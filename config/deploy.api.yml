service: grimdark-api
image: snaxmm/grimdark-api

proxy:
  host: snaxgames.app
  app_port: 3005
  path_prefixes:
    - /api
    - /socket
  strip_path_prefix: false

servers:
  web:
    - 143.244.147.133

registry:
  username: snaxmm
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: .
  dockerfile: Dockerfile.api

# Postgres on the same Docker network as the API. Hostname is <service>-<accessory> → grimdark-api-db.
# First time: kamal accessory boot db -c config/deploy.api.yml
accessories:
  db:
    image: postgres:17-alpine
    host: 143.244.147.133
    env:
      clear:
        POSTGRES_DB: grimdark
        POSTGRES_USER: postgres
      secret:
        - POSTGRES_PASSWORD

env:
  clear:
    POSTGRES_HOST: grimdark-api-db
    POSTGRES_PORT: "5432"
    POSTGRES_DB: grimdark
    POSTGRES_USER: postgres
    POSTGRES_SSLMODE: disable
    PORT: "3005"
    GO_ENV: production
    ALLOWED_ORIGINS: https://snaxgames.app
    SESSION_COOKIE_SECURE: "true"
    SESSION_COOKIE_SAMESITE: "lax"
  secret:
    - POSTGRES_PASSWORD
    - AUTH_SECRET
